name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master", "Juan" ] 
jobs:
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      # --- SAST (Semgrep) ---
      - name: 2. Análisis SAST con Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "1"

      - name: Guardar reporte SAST
        if: always() # Guarda el reporte aunque la prueba falle
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep
          path: semgrep.sarif

      # --- SCA e IaC (Trivy) ---
      - name: 3. Análisis SCA e IaC con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'reporte-trivy.json'
          severity: 'CRITICAL,HIGH'

      - name: Guardar reporte Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-trivy
          path: reporte-trivy.json

      # --- DAST (OWASP ZAP) ---
      - name: 4. Análisis DAST con OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://example.com' # Pon aquí la URL de tu app o una de prueba
          format: 'json'

      - name: Guardar reporte DAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-zap
          path: report_json.json